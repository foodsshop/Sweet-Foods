<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homemade Sweets Store</title>

<style>

:root{
--primary:#7b3f00;
--accent:#ff7a00;
--bg:#fff6ee;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
}

/* HEADER */

header{
background:var(--primary);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.cart-btn{
background:var(--accent);
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* HERO */

.hero{
padding:60px 20px;
text-align:center;
background:#ffe7d1;
}

.hero h1{
margin:0 0 10px;
font-size:38px;
}

/* PRODUCTS */

.products{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.15);
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:12px 0 6px;
}

.price{
color:var(--primary);
font-weight:bold;
margin-bottom:10px;
}

.card button{
background:var(--accent);
border:none;
color:white;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-bottom:16px;
}

/* CART */

.cart{
position:fixed;
top:0;
right:-420px;
width:420px;
height:100%;
background:white;
box-shadow:-6px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart.open{
right:0;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.total{
font-weight:bold;
margin:16px 0;
}

.checkout{
background:var(--accent);
border:none;
color:white;
padding:12px;
width:100%;
cursor:pointer;
border-radius:6px;
}

.cart-close{
font-size:22px;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
background:var(--primary);
color:white;
padding:16px;
margin-top:30px;
}

</style>
</head>

<body>

<header>

<div class="logo">🍬 Homemade Sweets</div>

<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>

</header>

<section class="hero">

<h1>Fresh Homemade Indian Sweets</h1>

<p>Pure ingredients • Traditional taste • Made with love</p>

</section>

<section class="products">

<div class="card">
<img src="basenlaadu.jpg">
<h3>Besan Laddu</h3>
<div class="price">₹350 / kg</div>
<button onclick="add('Besan Laddu',350)">Add to Cart</button>
</div>

<div class="card">
<img src="rasmali.jpg">
<h3>Rasmalai</h3>
<div class="price">₹40 / piece</div>
<button onclick="add('Rasmalai',40)">Add to Cart</button>
</div>

<div class="card">
<img src="gulabjamun.jpg">
<h3>Gulab Jamun</h3>
<div class="price">₹35 / piece</div>
<button onclick="add('Gulab Jamun',35)">Add to Cart</button>
</div>

<div class="card">
<img src="kajukatli.jpg">
<h3>Kaju Katli</h3>
<div class="price">₹900 / kg</div>
<button onclick="add('Kaju Katli',900)">Add to Cart</button>
</div>

</section>

<!-- CART -->

<div style="margin-top:10px">

<label>Select Delivery</label>

<select id="delivery" onchange="updateDelivery()">

<option value="0">Local Pickup (Free)</option>

<option value="50">Local Delivery ₹50</option>

<option value="80">Rapido Delivery ₹80</option>

<option value="100">Dunzo Delivery ₹100</option>

</select>

</div>

<div style="margin-top:10px">
Delivery: ₹<span id="deliveryCharge">0</span>
</div>

<div class="cart" id="cart">

<div style="display:flex;justify-content:space-between;align-items:center">
<h2>Your Cart</h2>
<span onclick="toggleCart()" style="cursor:pointer;font-size:22px;font-weight:bold">✖</span>
</div>

<div id="items"></div>

<div class="total">Total: ₹<span id="total">0</span></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<button class="checkout" onclick="checkout()">
Order on WhatsApp
</button>

<br><br>

<button class="checkout" onclick="razorpayDemo()">
Pay Online (Demo)
</button>

</div>

<footer>

© 2026 Homemade Sweets Store

</footer>

<script>

let cart={}

function toggleCart(){
document.getElementById("cart").classList.toggle("open")
}

function add(name,price){

if(!cart[name]){

cart[name]={price:price,qty:1}

}else{

cart[name].qty++

}

update()

}

function change(name,val){

cart[name].qty+=val

if(cart[name].qty<=0){

delete cart[name]

}

update()

}

function update(){

let items=document.getElementById("items")

items.innerHTML=""

let total=0

let count=0

for(let i in cart){

let item=cart[i]

total+=item.price*item.qty

count+=item.qty

items.innerHTML+=`

<div class="item">

<div>

${i}<br>

₹${item.price} x ${item.qty}

</div>

<div>

<button onclick="change('${i}',-1)">-</button>

<button onclick="change('${i}',1)">+</button>

</div>

</div>

`

}

document.getElementById("total").innerText=total+delivery

document.getElementById("count").innerText=count

}

function checkout(){

if(Object.keys(cart).length===0){

alert("Cart empty")

return

}

let text="Hello, I want to order:%0A"

for(let i in cart){

text+=`${i} x ${cart[i].qty}%0A`

}

text+="%0ATotal: ₹"+document.getElementById("total").innerText

window.open("https://wa.me/919356755100?text="+text)

}

function razorpayDemo(){

alert("Online payment integration coming soon.")

}

</script>

</body>
</html>
