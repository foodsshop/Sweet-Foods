<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Failed</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff416c,#ff4b2b);
}

/* Card */

.container{
background:white;
padding:45px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
animation:fade .7s ease;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* Icon */

.icon{
font-size:80px;
color:#ff4b2b;
animation:shake .6s ease;
}

@keyframes shake{

0%{transform:translateX(0)}

25%{transform:translateX(-8px)}

50%{transform:translateX(8px)}

75%{transform:translateX(-8px)}

100%{transform:translateX(0)}

}

h1{
margin:10px 0;
}

p{
color:#555;
}

/* Button */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:#ff4b2b;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="icon">✖</div>

<h1>Payment Failed</h1>

<p>Your payment could not be completed.<br>
Please try again.</p>

<a href="index.html" class="btn">
Try Again
</a>

</div>

</body>
</html>
