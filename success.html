<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#11998e,#38ef7d);
}

/* Card */

.container{
background:white;
padding:45px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
animation:fade .7s ease;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.8);
}
to{
opacity:1;
transform:scale(1);
}
}

/* Icon */

.icon{
font-size:80px;
color:#00b894;
animation:pop .6s ease;
}

@keyframes pop{
0%{transform:scale(0)}
70%{transform:scale(1.3)}
100%{transform:scale(1)}
}

h1{
margin:10px 0;
}

p{
color:#555;
}

/* Button */

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:#00b894;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<div class="icon">✔</div>

<h1>Payment Successful</h1>

<p>Your order has been confirmed.<br>
Thank you for ordering sweets.</p>

<a href="index.html" class="btn">
Back to Home
</a>

</div>

</body>
</html>
